name: Recover due Socio posts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: socio-publish-due
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Queue overdue posts
        env:
          CRON_SECRET: ${{ secrets.SOCIO_CRON_SECRET }}
          SOCIO_CRON_URL: ${{ vars.SOCIO_CRON_URL }}
        run: |
          test -n "$CRON_SECRET"
          test -n "$SOCIO_CRON_URL"
          curl --fail-with-body --retry 3 --retry-all-errors --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SOCIO_CRON_URL/api/cron/publish-due"
